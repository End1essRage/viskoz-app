name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        platform: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Установка Rust
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      # Установка Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Установка системных зависимостей для Linux
      - name: Install Tauri dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            file \
            protobuf-compiler

      # Кэширование
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      # Установка npm-зависимостей
      - name: Install npm dependencies
        run: npm install

      # Сборка внешнего CLI для нужной платформы
      - name: Build CLI binary
        run: |
          cd cli
          cargo build --release
          cd ..
          mkdir -p src-tauri/binaries
          # Под Windows бинарник будет .exe, под Linux без расширения
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            cp cli/target/release/viskoz-cli.exe src-tauri/binaries/
          else
            cp cli/target/release/viskoz-cli src-tauri/binaries/
          fi

      # Сборка Tauri приложения
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Release ${{ github.ref_name }}"
          releaseBody: "Automated release."
          releaseDraft: true
          prerelease: false